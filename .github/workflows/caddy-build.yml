name: Caddy Docker Build and Push

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile.caddy'
      - '.github/workflows/caddy-build.yml'
  workflow_dispatch:

env:
  DOCKERHUB_REGISTRY: docker.io
  ACR_REGISTRY: registry.cn-beijing.aliyuncs.com
  ACR_NAMESPACE: skiinder

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------- Docker Hub login ----------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------- ACR login ----------
      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ---------- Metadata ----------
      - name: Extract metadata for Docker Hub
        id: meta_dockerhub
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/livekit-caddy
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for ACR
        id: meta_acr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/livekit-caddy
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ---------- Build & push ----------
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.caddy
          platforms: linux/amd64
          push: true
          no-cache: true
          tags: |
            ${{ steps.meta_dockerhub.outputs.tags }}
            ${{ steps.meta_acr.outputs.tags }}
          labels: |
            ${{ steps.meta_dockerhub.outputs.labels }}
            ${{ steps.meta_acr.outputs.labels }}
