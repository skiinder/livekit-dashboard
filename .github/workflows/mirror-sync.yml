name: Mirror Sync to ACR

on:
  schedule:
    - cron: '0 */6 * * *'         # 每 6 小时
  workflow_dispatch:

env:
  ACR_REGISTRY: registry.cn-beijing.aliyuncs.com
  ACR_NAMESPACE: skiinder

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - source: livekit/livekit-server:latest
            target: livekit-server:latest
          - source: redis:7-alpine
            target: redis:7-alpine
          - source: coturn/coturn:latest
            target: coturn:latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Pull, tag and push
        run: |
          set -e
          docker pull ${{ matrix.source }}
          docker tag ${{ matrix.source }} ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ matrix.target }}
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ matrix.target }}
          echo "✅ ${{ matrix.source }} → ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ matrix.target }}"
